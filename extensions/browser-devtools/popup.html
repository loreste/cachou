<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      body {
        font: 13px/1.4 system-ui, sans-serif;
        margin: 0;
        padding: 12px;
        width: 260px;
        color: #0f172a;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 10px;
        color: #475569;
      }
      button {
        width: 100%;
        padding: 8px;
        border: 0;
        border-radius: 8px;
        background: #0d9488;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .status {
        font-size: 12px;
        margin-top: 10px;
        padding: 8px;
        background: #f1f5f9;
        border-radius: 6px;
      }
      code {
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <h1>CachouJS DevTools</h1>
    <p>Toggle the in-page panel on the active tab.</p>
    <button id="toggle" type="button">Toggle DevTools</button>
    <div class="status" id="status">Checking page…</div>
    <script src="popup.js"></script>
  </body>
</html>
