<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CachouJS Framework Unit Tests</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 {
      font-weight: 700;
      color: #f1f5f9;
      border-bottom: 1px solid #334155;
      padding-bottom: 12px;
    }
    .test-summary {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      background: #1e293b;
      padding: 16px;
      border-radius: 8px;
      border: 1px solid #334155;
    }
    .summary-stat {
      font-weight: bold;
      padding: 6px 12px;
      border-radius: 4px;
    }
    .summary-stat.passed {
      background: #064e3b;
      color: #34d399;
    }
    .summary-stat.failed {
      background: #7f1d1d;
      color: #f87171;
    }
    .test-item {
      display: flex;
      flex-direction: column;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      margin-bottom: 12px;
      padding: 12px;
    }
    .test-item.passed {
      border-left: 4px solid #10b981;
    }
    .test-item.failed {
      border-left: 4px solid #ef4444;
    }
    .status-badge {
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
      width: fit-content;
      margin-bottom: 6px;
    }
    .passed .status-badge {
      background: #10b981;
      color: #0f172a;
    }
    .failed .status-badge {
      background: #ef4444;
      color: #ffffff;
    }
    .test-name {
      font-size: 16px;
      font-weight: 500;
    }
    .error-log {
      margin-top: 8px;
      background: #0f172a;
      color: #ef4444;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
      font-family: monospace;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>CachouJS Unit Test Suite</h1>
  <div id="test-results"></div>

  <script type="module">
    import { runTestsAndRender } from "./tests.js";
    runTestsAndRender();
  </script>
</body>
</html>
