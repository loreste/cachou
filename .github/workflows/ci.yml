name: CachouJS CI

on:
  push:
  pull_request:
  # Manual re-run of the branch tip without a new commit (when the tip has not moved).
  workflow_dispatch:

# Prefer finishing one push at a time; cancel superseded runs for the same ref.
concurrency:
  group: cachou-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Required quality gate for merges and release tags.
  verify-linux:
    name: Verify (Linux / Chromium)
    runs-on: ubuntu-latest
    env:
      npm_config_cache: /tmp/cachou-npm-cache
      CACHOU_COMPARE_SAMPLES: "3"
      CACHOU_DEMO: "1"
      CACHOU_TEST_BROWSER: chromium
      CACHOU_SKIP_COMPILER_BUILD: "0"
      # Explicit CI benchmark noise budget (also defaulted in run-benchmarks.mjs).
      CACHOU_BENCH_RATIO: "3"
      CACHOU_BENCH_SLACK_MS: "40"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
          # No go.sum in this repo (compiler is a single-file build).
          cache: false

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Unit tests
        run: npm run test:unit

      - name: Build compiler
        run: npm run compiler:build

      - name: Full verification
        run: npm run check

      - name: Package dry run
        run: npm run pack:dry

      - name: Package VS Code extension (VSIX dry)
        run: npm run ext:package

      - name: Package browser DevTools zip
        run: npm run ext:devtools

      - name: Upload extension packages
        uses: actions/upload-artifact@v6
        with:
          name: cachou-extensions
          path: |
            vscode-cachou/*.vsix
            extensions/browser-devtools/*.zip
          if-no-files-found: warn
          retention-days: 14

  # Optional signal only. Runs after Linux so the required gate is not waiting
  # behind a second concurrent macOS runner allocation.
  verify-macos:
    name: Verify (macOS Safari optional)
    needs: verify-linux
    runs-on: macos-latest
    # Optional signal only. Step-level continue-on-error keeps the job (and
    # commit check) green when Safari automation times out on GHA runners.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      npm_config_cache: /tmp/cachou-npm-cache
      CACHOU_COMPARE_SAMPLES: "3"
      CACHOU_DEMO: "1"
      CACHOU_TEST_BROWSER: safari
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
          cache: false

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

      - name: Browser tests (Safari)
        id: safari
        continue-on-error: true
        timeout-minutes: 10
        run: npm run test:browser

      - name: Note Safari outcome
        run: |
          if [ "${{ steps.safari.outcome }}" = "failure" ]; then
            echo "::warning::Safari browser tests failed (optional on GHA macOS; Linux Chromium is the required gate)"
          else
            echo "Safari browser tests passed"
          fi
