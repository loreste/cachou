name: CachouJS CI

on:
  push:
  pull_request:

jobs:
  verify-linux:
    name: Verify (Linux / Chromium)
    runs-on: ubuntu-latest
    env:
      npm_config_cache: /tmp/cachou-npm-cache
      CACHOU_COMPARE_SAMPLES: "3"
      CACHOU_DEMO: "1"
      CACHOU_TEST_BROWSER: chromium
      CACHOU_SKIP_COMPILER_BUILD: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          # No go.sum in this repo (compiler is a single-file build).
          cache: false

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Unit tests
        run: npm run test:unit

      - name: Build compiler
        run: npm run compiler:build

      - name: Full verification
        run: npm run check

      - name: Package dry run
        run: npm run pack:dry

  verify-macos:
    name: Verify (macOS Safari optional)
    runs-on: macos-latest
    # Optional signal only. Step-level continue-on-error keeps the job (and
    # commit check) green when Safari automation times out on GHA runners.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      npm_config_cache: /tmp/cachou-npm-cache
      CACHOU_COMPARE_SAMPLES: "3"
      CACHOU_DEMO: "1"
      CACHOU_TEST_BROWSER: safari
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: false

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test:unit

      - name: Browser tests (Safari)
        id: safari
        continue-on-error: true
        timeout-minutes: 10
        run: npm run test:browser

      - name: Note Safari outcome
        run: |
          if [ "${{ steps.safari.outcome }}" = "failure" ]; then
            echo "::warning::Safari browser tests failed (optional on GHA macOS; Linux Chromium is the required gate)"
          else
            echo "Safari browser tests passed"
          fi
